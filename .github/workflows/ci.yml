name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build, vet, fmt, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Built from source with the same toolchain as the rest of this job,
      # rather than golangci-lint-action's downloaded prebuilt binary —
      # that binary is built by golangci-lint's own release pipeline with
      # whatever Go version it happened to use, which can be older than
      # this module's go.mod minimum and makes it refuse to run at all.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...
